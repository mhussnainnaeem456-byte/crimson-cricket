<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Cricket Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .match-card {
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .live-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            color: #aaa;
        }
        .score-text { color: #ff4d4d; font-size: 24px; font-weight: bold; }
        .vs-text { color: #555; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <header class="flex items-center gap-2 mb-8">
            <div class="bg-red-600 p-2 rounded-lg">🏆</div>
            <h1 class="text-xl font-black tracking-tighter">CRIMSON<span class="text-red-600">CRICKET</span></h1>
        </header>

        <h2 class="text-4xl font-bold mb-2">Live Action ⚡</h2>
        <p class="text-gray-400 mb-6">Real-time scores from around the cricketing world</p>

        <button onclick="fetchScores()" class="w-full bg-[#1a1a1a] border border-[#333] py-3 rounded-xl mb-8 flex items-center justify-center gap-2">
            🔄 Refresh Scores
        </button>

        <div id="matches-list">
            <div class="text-center text-gray-600 py-10">Searching for live matches...</div>
        </div>
    </div>

    <script>
        async function fetchScores() {
            try {
                const res = await fetch('/api/score');
                const data = await res.json();
                const list = document.getElementById('matches-list');
                
                if(!data || data.length === 0) {
                    list.innerHTML = "<div class='match-card text-center'>No Live Matches Right Now</div>";
                    return;
                }

                list.innerHTML = data.map(match => `
                    <div class="match-card relative">
                        <div class="flex justify-between items-center mb-6">
                            <span class="live-tag">🕒 LIVE MATCH</span>
                            <span class="text-gray-500 text-xl">☆</span>
                        </div>
                        
                        <div class="flex flex-col items-center gap-2">
                            <div class="text-2xl font-bold text-white">${match.title}</div>
                            <div class="vs-text">vs</div>
                            <div class="score-text">${match.score || 'Waiting for Update...'}</div>
                        </div>

                        <div class="mt-6 pt-4 border-t border-[#333] flex justify-between items-center text-gray-500 text-sm">
                            <span>International Series</span>
                            <span>🏆</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }
        fetchScores();
        setInterval(fetchScores, 20000); // 20 Seconds auto refresh
    </script>
</body>
</html>
