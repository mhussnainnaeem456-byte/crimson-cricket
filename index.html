<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Cricket Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .match-card { background: #121212; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .live-badge { background: #ff0000; color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-2 mb-6">
            <div class="bg-red-600 p-2 rounded-lg">🏆</div>
            <h1 class="text-xl font-bold tracking-tight">CRIMSON<span class="text-red-600">CRICKET</span></h1>
        </div>

        <h2 class="text-4xl font-black mb-2">Live Action ⚡</h2>
        <p class="text-gray-400 mb-6">Real-time scores from around the cricketing world</p>

        <div id="matches-list">
            <div class="text-center text-gray-500 py-10">Searching for live matches...</div>
        </div>
    </div>

    <script>
        async function getLiveScores() {
            try {
                const response = await fetch('/api/score');
                const data = await response.json();
                const container = document.getElementById('matches-list');
                
                if(data.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-500">No Matches Currently Live</div>';
                    return;
                }

                container.innerHTML = data.map(match => `
                    <div class="match-card p-4">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs text-gray-500 font-bold uppercase tracking-widest">● LIVE NOW</span>
                            <span class="live-badge">STUMPS</span>
                        </div>
                        <div class="flex flex-col gap-3">
                            <div class="text-lg font-bold flex justify-between">
                                <span>${match.title}</span>
                            </div>
                            <div class="text-2xl font-black text-red-500 bg-red-500/5 p-3 rounded-xl border border-red-500/10">
                                ${match.score || 'Waiting for update...'}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.log("Error loading scores");
            }
        }
        getLiveScores();
        setInterval(getLiveScores, 15000);
    </script>
</body>
</html>
